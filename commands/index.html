<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Command Reference</title>
<link rel="stylesheet" href="commands.css">
</head>
<body>
<div class="page">

  <header>
    <h1>Command Reference</h1>
    <p>Fill in what applies to you to see your available commands and cooldowns.</p>
  </header>

  <div class="card">
    <div class="card-title">Your Profile</div>

    <div class="field">
      <label class="field-label" for="nameInput">Name</label>
      <input type="text" id="nameInput" placeholder="Enter your username…" autocomplete="off" spellcheck="false">
    </div>

    <div class="field">
      <label class="field-label" for="monthsInput">How many months have you subscribed total?</label>
      <input type="number" id="monthsInput" min="0" placeholder="0">
    </div>

    <div class="field">
      <div class="checkboxes" id="roleCheckboxes"></div>
    </div>
  </div>

  <div id="results">
    <div class="placeholder-card">Enter your details above to see your commands.</div>
  </div>

</div>
<script src="commands.js"></script>
</body>
</html>
